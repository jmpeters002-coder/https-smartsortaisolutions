{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="text-center mb-5">
        <h1 class="fw-bold">SmartSort AI Blog</h1>
        <p class="text-muted">
            Insights, tutorials, and career guides in AI and software development.
        </p>
    </div>

    <div class="row g-4">

        {% for post in posts %}

<div class="card mb-4 shadow-sm">

<div class="card-body">

<h3>{{ post.title }}</h3>

<p class="text-muted">
{{ post.summary }}
</p>

<a href="{{ url_for('blog_bp.blog_post', slug=post.slug) }}"
   class="btn btn-primary">
Read More
</a>

</div>

</div>

{% endfor %}

    </div>

</div>

{% endblock %}
