{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <h2>Create Blog Post</h2>

    <form method="POST">
        <input type="text" name="title" class="form-control mb-3" placeholder="Title" required>

        <textarea name="summary" class="form-control mb-3" placeholder="Summary" required></textarea>

        <textarea name="content" class="form-control mb-3" rows="10" placeholder="Full Content" required></textarea>

        <button type="submit" class="btn btn-success">Publish</button>
    </form>
</div>
{% endblock %}
