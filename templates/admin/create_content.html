{% extends "base.html" %}

{% block content %}
<div class="container mt-5">

    <h2>Create Content</h2>

    <form method="POST" enctype="multipart/form-data">

        <!-- CONTENT TYPE -->
        <label>Content Type</label>
        <select name="content_type" class="form-control mb-3" required>
            <option value="blog">Blog</option>
            <option value="news">News</option>
        </select>

        <!-- TITLE -->
        <input type="text" name="title" class="form-control mb-3" placeholder="Title" required>

        <!-- SUMMARY -->
        <textarea name="summary" class="form-control mb-3" placeholder="Summary" required></textarea>

        <!-- FULL CONTENT -->
        <textarea name="content" id="editor" class="form-control" rows="10"></textarea>

        <!-- STATUS -->
        <label>Status</label>
        <select name="status" class="form-control mb-3">
            <option value="draft">Draft</option>
            <option value="published">Publish</option>
        </select>

        <!-- IMAGE -->
        <label>Featured Image</label>
        <input type="file" name="image" class="form-control mb-3">

        <button type="submit" class="btn btn-success">Publish Content</button>

    </form>
</div>

<script src="https://cdn.ckeditor.com/4.22.1/standard/ckeditor.js"></script>
<script>
    CKEDITOR.replace('editor');
</script>
{% endblock %}
